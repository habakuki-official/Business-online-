<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Dashboard</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f2f2f2;
}

/* HEADER */
.header{
  background:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.header h2{
  color:#2c3e50;
}

/* CARD TOP */
.card{
  background:#1f4e79;
  color:white;
  margin:15px;
  padding:20px;
  border-radius:15px;
}
.card h3{
  margin:0;
}
.flex{
  display:flex;
  justify-content:space-between;
}

/* ICON MENU */
.menu{
  display:flex;
  justify-content:space-around;
  margin:15px;
}
.menu div{
  text-align:center;
}
.menu img{
  width:50px;
  background:white;
  padding:10px;
  border-radius:50%;
}

/* BONUS */
.bonus{
  background:linear-gradient(red, darkred);
  color:white;
  margin:15px;
  padding:20px;
  border-radius:15px;
  font-size:20px;
}

/* BOTTOM NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">
  <h2>Business Online</h2>
</div>

<!-- TOP CARD -->
<div class="card">
  <div class="flex">
    <div>
      <h3>Expense</h3>
      <p>24,000 BIF</p>
    </div>
    <div>
      <h3>Net Income</h3>
      <p id="balance">0 BIF</p>
    </div>
  </div>
</div>

<!-- MENU -->
<div class="menu">
  <div>
    <img src="https://img.icons8.com/ios-filled/50/user.png"/>
    <p>Profile</p>
  </div>
  <div>
    <img src="https://img.icons8.com/ios-filled/50/company.png"/>
    <p>Pay Client</p>
  </div>
  <div>
    <img src="https://img.icons8.com/ios-filled/50/money.png"/>
    <p>Cash Out</p>
  </div>
  <div>
    <img src="https://img.icons8.com/ios-filled/50/box.png"/>
    <p>Bundles</p>
  </div>
</div>

<!-- BONUS -->
<div class="bonus">
  🎁 Welcome Bonus: <span id="bonus">0</span> BIF
</div>

<!-- TASK -->
<div style="text-align:center; margin:20px;">
  <button onclick="doTask()" style="padding:15px 30px; background:lime; border:none; border-radius:10px;">
    Do Task (+150 BIF)
  </button>
</div>

<!-- NAV -->
<div class="nav">
  <div>Dashboard</div>
  <div>Team</div>
  <div>Withdraw</div>
  <div onclick="logout()">Sign out</div>
</div>

<script>

// GET BALANCE
let balance = localStorage.getItem("balance") || 0;
document.getElementById("balance").innerText = balance + " BIF";
document.getElementById("bonus").innerText = balance;

// TASK BUTTON
function doTask(){
  balance = parseInt(balance) + 150;
  localStorage.setItem("balance", balance);
  document.getElementById("balance").innerText = balance + " BIF";
  document.getElementById("bonus").innerText = balance;
}

// LOGOUT
function logout(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
