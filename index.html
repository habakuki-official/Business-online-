<!DOCTYPE html>
<html>
<head>
    <title>Business Online</title>

    <style>
        body {
            background: #000;
            color: #00ff00;
            font-family: Arial, sans-serif;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;

            padding-top: 60px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
        }

        input {
            width: 250px;
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
        }

        button {
            background: #00ff00;
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #00cc00;
        }

        a {
            color: #00ff00;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>

<body>

    <h1>Business Online</h1>
    <p>Login to start your journey</p>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Start Business Now</button>

    <a href="register.html">Create New Account</a>

    <p id="message"></p>

    <script>
        function login(){
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            let savedUser = localStorage.getItem("username");
            let savedPass = localStorage.getItem("password");

            if(user === savedUser && pass === savedPass){
                alert("Welcome " + user);
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("message").innerText = "❌ Wrong username or password";
            }
        }

        function createAccount(){
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            if(user === "" || pass === ""){
                alert("Please fill all fields");
                return;
            }

            localStorage.setItem("username", user);
            localStorage.setItem("password", pass);

            document.getElementById("message").innerText = "✅ Account created successfully!";
        }
    </script>

</body>
</html>
